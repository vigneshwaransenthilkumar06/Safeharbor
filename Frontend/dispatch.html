<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch - SafeHarbor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/dispatch.css">
</head>
<body>
    <header class="bg-dark text-white text-center p-3">
        <h2>Resource Dispatch</h2>
    </header>

    <div class="container mt-4">

        <div class="card shadow p-4 mb-4">
            <h4 class="mb-3">Send Supplies to an Incident</h4>
            <form id="dispatchForm">
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="number" class="form-control" id="incidentId" placeholder="Incident ID" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" class="form-control" id="itemId" placeholder="Inventory Item ID" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" class="form-control" id="quantity" placeholder="Quantity" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark mt-3">Dispatch</button>
            </form>
            <small class="text-muted mt-2">
                Tip: Check the Incidents and Inventory pages to find the correct IDs.
            </small>
        </div>

        <h4>All Dispatches</h4>
        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Incident</th>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="dispatchTable">
            </tbody>
        </table>

        <a href="index.html" class="btn btn-secondary">Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/dispatch.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidents - SafeHarbor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/incidents.css">
</head>
<body>
    <header class="bg-danger text-white text-center p-3">
        <h2>Disaster Incidents</h2>
    </header>

    <div class="container mt-4">

        <div class="card shadow p-4 mb-4">
            <h4 class="mb-3">Report New Incident</h4>
            <form id="incidentForm">
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="title" placeholder="Title" required>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select" id="incidentType" required>
                            <option value="">Select Type</option>
                            <option value="FLOOD">Flood</option>
                            <option value="FIRE">Fire</option>
                            <option value="EARTHQUAKE">Earthquake</option>
                            <option value="CYCLONE">Cyclone</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select" id="severityLevel" required>
                            <option value="">Select Severity</option>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="CRITICAL">Critical</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="location" placeholder="Location">
                    </div>
                    <div class="col-12">
                        <textarea class="form-control" id="description" rows="2" placeholder="Description"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger mt-3">Report Incident</button>
            </form>
        </div>

        <h4>All Incidents</h4>
        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Severity</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Responder</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="incidentTable">
            </tbody>
        </table>

        <a href="index.html" class="btn btn-secondary">Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/incidents.js"></script>
</body>
</html>

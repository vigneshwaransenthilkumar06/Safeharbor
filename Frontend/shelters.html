<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelters - SafeHarbor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/shelters.css">
</head>
<body>
    <header class="bg-primary text-white text-center p-3">
        <h2>Relief Shelters</h2>
    </header>

    <div class="container mt-4">

        <div class="card shadow p-4 mb-4">
            <h4 class="mb-3">Register New Shelter</h4>
            <form id="shelterForm">
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="shelterName" placeholder="Shelter Name" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="address" placeholder="Address">
                    </div>
                    <div class="col-md-6">
                        <input type="number" class="form-control" id="capacity" placeholder="Capacity" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="managerName" placeholder="Manager Name">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Register Shelter</button>
            </form>
        </div>

        <h4>All Shelters</h4>
        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Capacity</th>
                    <th>Occupancy</th>
                    <th>Manager</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="shelterTable">
            </tbody>
        </table>

        <a href="index.html" class="btn btn-secondary">Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/shelters.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - SafeHarbor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/inventory.css">
</head>
<body>
    <header class="bg-success text-white text-center p-3">
        <h2>Supply Inventory</h2>
    </header>

    <div class="container mt-4">

        <div class="card shadow p-4 mb-4">
            <h4 class="mb-3">Add New Supply Item</h4>
            <form id="inventoryForm">
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="itemName" placeholder="Item Name" required>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select" id="category" required>
                            <option value="">Select Category</option>
                            <option value="FOOD">Food</option>
                            <option value="WATER">Water</option>
                            <option value="MEDICAL">Medical</option>
                            <option value="SHELTER">Shelter</option>
                            <option value="POWER">Power</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="number" class="form-control" id="quantity" placeholder="Quantity" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="unit" placeholder="Unit (e.g. boxes, litres)">
                    </div>
                    <div class="col-md-4">
                        <input type="number" class="form-control" id="criticalThreshold" placeholder="Low Stock Alert Level">
                    </div>
                </div>
                <button type="submit" class="btn btn-success mt-3">Add Item</button>
            </form>
        </div>

        <button class="btn btn-outline-danger mb-3" onclick="loadLowStock()">Show Low Stock Items Only</button>
        <button class="btn btn-outline-secondary mb-3" onclick="loadInventory()">Show All Items</button>

        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Item Name</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Unit</th>
                    <th>Low Stock Alert Level</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="inventoryTable">
            </tbody>
        </table>

        <a href="index.html" class="btn btn-secondary">Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/inventory.js"></script>
</body>
</html>
